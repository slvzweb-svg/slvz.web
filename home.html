<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin Lider Jester</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === PALETA JESTER === */
        :root {
            --bg-main: #050505;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --red-accent: #9e0000;
            --red-light: #ff1a1a;
            --gold-accent: #d4af37;
            --white: #f5f5f5;
            --text-dim: #999999;
            --border-color: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* === HEADER === */
        header {
            background: rgba(17, 17, 17, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--red-accent);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-title i {
            color: var(--gold-accent);
            font-size: 1.5rem;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            border-color: var(--red-light);
            color: var(--red-light);
        }

        /* === BANNER === */
        .banner {
            width: 100%;
            height: 300px;
            background-image: url('https://parallel-lime-m6ureq9zn0.edgeone.app/IMG_20260408_095503.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-bottom: 3px solid var(--gold-accent);
            position: relative;
            margin-top: 60px; /* Space for fixed header */
        }

        .banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80%;
            background: linear-gradient(to top, var(--bg-main) 10%, transparent);
        }

        /* === CONTAINER & GRID === */
        .container {
            max-width: 1200px;
            margin: -50px auto 50px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--white);
        }

        .section-title i { color: var(--red-light); }

        .loading-text {
            text-align: center;
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-top: 50px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* === CARD CANDIDATURA === */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--red-accent);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            animation: fadeIn 0.5s ease backwards;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(158, 0, 0, 0.2);
            border-top-color: var(--gold-accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .card-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .card-body p {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .card-body strong { color: var(--white); }

        .discord-tag {
            display: inline-block;
            background: rgba(88, 101, 242, 0.2);
            color: #5865F2;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 5px;
            border: 1px solid rgba(88, 101, 242, 0.5);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-read {
            background: var(--bg-input);
            color: var(--white);
            border: 1px solid var(--border-color);
        }

        .btn-read:hover {
            background: var(--gold-accent);
            color: #000;
            border-color: var(--gold-accent);
        }

        .btn-delete {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border-color);
        }

        .btn-delete:hover {
            background: rgba(255, 26, 26, 0.1);
            color: var(--red-light);
            border-color: var(--red-light);
        }

        /* === MODALS (POPUP) === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Modal de Leitura */
        .modal-read {
            background: var(--bg-card);
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            border-radius: 8px;
            border-top: 4px solid var(--gold-accent);
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-read { transform: scale(1); }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { color: var(--white); font-size: 1.5rem; }
        
        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-modal:hover { color: var(--red-light); }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        /* Custom Scrollbar */
        .modal-body::-webkit-scrollbar { width: 8px; }
        .modal-body::-webkit-scrollbar-track { background: var(--bg-main); }
        .modal-body::-webkit-scrollbar-thumb { background: var(--red-accent); border-radius: 4px; }
        .modal-body::-webkit-scrollbar-thumb:hover { background: var(--red-light); }

        .data-group {
            margin-bottom: 25px;
            background: var(--bg-input);
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid var(--red-accent);
        }

        .data-group h3 {
            font-size: 1rem;
            color: var(--gold-accent);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .data-row {
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 0.95rem;
        }
        .data-row strong { color: var(--white); display: block; margin-bottom: 2px; }
        .data-answer { background: #222; padding: 10px; border-radius: 4px; margin-top: 5px; white-space: pre-wrap; }

        /* Modal de Confirmação (Excluir) */
        .modal-confirm {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--red-accent);
            text-align: center;
            transform: translateY(-30px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal-confirm { transform: translateY(0); }

        .modal-confirm i { font-size: 3rem; color: var(--red-light); margin-bottom: 15px; }
        .modal-confirm h3 { color: var(--white); margin-bottom: 10px; }
        .modal-confirm p { color: var(--text-dim); margin-bottom: 25px; font-size: 0.9rem; }
        
        .confirm-actions { display: flex; gap: 15px; justify-content: center; }
        
        .btn-cancel {
            padding: 10px 20px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--white);
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-cancel:hover { background: #333; }
        
        .btn-confirm-delete {
            padding: 10px 20px;
            background: var(--red-accent);
            border: none;
            color: var(--white);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-confirm-delete:hover { background: var(--red-light); }

        /* === TOAST === */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--bg-card);
            border-left: 4px solid var(--red-accent);
            color: var(--white);
            padding: 15px 25px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: 500;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: var(--gold-accent); }
        .toast.error { border-left-color: var(--red-light); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <i class="fa-solid fa-mask"></i>
            Admin Lider Jester
        </div>
        <button class="btn-logout" id="btnLogout">
            Sair <i class="fa-solid fa-right-from-bracket"></i>
        </button>
    </header>

    <div class="banner"></div>

    <div class="container">
        <h2 class="section-title"><i class="fa-solid fa-inbox"></i> Candidaturas Pendentes</h2>
        
        <div id="loading" class="loading-text">
            <i class="fa-solid fa-spinner fa-spin"></i> Carregando formulários...
        </div>

        <div class="cards-grid" id="cardsContainer">
            </div>
    </div>

    <div class="modal-overlay" id="readModalOverlay">
        <div class="modal-read">
            <div class="modal-header">
                <h2>Ficha do Candidato</h2>
                <button class="close-modal" onclick="closeReadModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="modalBodyContent">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModalOverlay">
        <div class="modal-confirm">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <h3>Excluir Candidatura?</h3>
            <p>Essa ação não pode ser desfeita. O formulário será apagado permanentemente.</p>
            <div class="confirm-actions">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
                <button class="btn-confirm-delete" id="btnConfirmDelete">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ==========================================
        // ⚠️ COLOQUE SUAS CREDENCIAIS DO FIREBASE AQUI
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAwVQFewEN1mQDe0pnIEVU_H98l5JCeciI",
            authDomain: "site-f55e1.firebaseapp.com",
            projectId: "site-f55e1",
            storageBucket: "site-f55e1.firebasestorage.app",
            messagingSenderId: "800441189890",
            appId: "1:800441189890:web:27f8911aa47964665f091b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // UI Elements
        const cardsContainer = document.getElementById('cardsContainer');
        const loadingText = document.getElementById('loading');
        const btnLogout = document.getElementById('btnLogout');
        
        let allApplications = []; // Armazena os dados em memória para o modal
        let deleteIdTarget = null; // Guarda o ID de quem vai ser excluído

        // Sistema de Toast
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '<i class="fa-solid fa-check" style="color: var(--gold-accent);"></i>' : '<i class="fa-solid fa-xmark" style="color: var(--red-light);"></i>';
            toast.innerHTML = `<span style="font-size: 1.2rem;">${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ==========================================
        // PROTEÇÃO DA ROTA (AUTH)
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Se não estiver logado, chuta pra fora
                window.location.href = 'index.html';
            }
        });

        btnLogout.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'index.html';
            });
        });

        // ==========================================
        // BUSCAR E RENDERIZAR DADOS (TEMPO REAL)
        // ==========================================
        const q = query(collection(db, "formularios_staff"), orderBy("dataEnvio", "desc"));
        
        onSnapshot(q, (snapshot) => {
            loadingText.style.display = 'none';
            cardsContainer.innerHTML = '';
            allApplications = [];

            if (snapshot.empty) {
                cardsContainer.innerHTML = '<p style="color: var(--text-dim); grid-column: 1/-1; text-align: center;">Nenhuma candidatura pendente no momento.</p>';
                return;
            }

            let delay = 0;

            snapshot.forEach((doc) => {
                const data = doc.data();
                data.id = doc.id;
                allApplications.push(data);

                // Formatar Data
                let dataFormatada = "Data desconhecida";
                if(data.dataEnvio) {
                    const dateObj = data.dataEnvio.toDate();
                    dataFormatada = dateObj.toLocaleDateString('pt-BR') + ' às ' + dateObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${delay}s`;
                delay += 0.05; // Animação em cascata

                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <div class="card-name"><i class="fa-solid fa-user"></i> ${data.nome}</div>
                            <span class="card-date">${dataFormatada}</span>
                        </div>
                        <div class="card-body">
                            <p><strong>Idade:</strong> ${data.idade} anos | <strong>Estado:</strong> ${data.estado}</p>
                            <p><strong>Exp Staff:</strong> ${data.experiencia === 'sim' ? '<span style="color:var(--gold-accent)">Sim</span>' : 'Não'}</p>
                            <div class="discord-tag"><i class="fa-brands fa-discord"></i> ${data.discord}</div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-action btn-read" onclick="openReadModal('${data.id}')"><i class="fa-solid fa-eye"></i> Ler</button>
                        <button class="btn-action btn-delete" onclick="triggerDelete('${data.id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                cardsContainer.appendChild(card);
            });
        }, (error) => {
            console.error("Erro ao buscar dados: ", error);
            showToast("Erro ao carregar dados.", "error");
        });

        // ==========================================
        // LÓGICA DO MODAL DE LEITURA
        // ==========================================
        window.openReadModal = function(id) {
            const data = allApplications.find(app => app.id === id);
            if(!data) return;

            const modalBody = document.getElementById('modalBodyContent');
            
            modalBody.innerHTML = `
                <div class="data-group">
                    <h3><i class="fa-solid fa-address-card"></i> Pessoal</h3>
                    <div class="data-row"><strong>Nome:</strong> ${data.nome}</div>
                    <div class="data-row"><strong>Idade:</strong> ${data.idade} | <strong>Estado:</strong> ${data.estado}</div>
                    <div class="data-row"><strong>Discord:</strong> <span class="discord-tag">${data.discord}</span></div>
                </div>

                <div class="data-group">
                    <h3><i class="fa-solid fa-gamepad"></i> Experiência</h3>
                    <div class="data-row"><strong>Já foi Staff?</strong> ${data.experiencia.toUpperCase()}</div>
                    ${data.experiencia === 'sim' ? `<div class="data-row"><strong>Detalhes:</strong> <div class="data-answer">${data.experienciaDetalhes}</div></div>` : ''}
                </div>

                <div class="data-group">
                    <h3><i class="fa-solid fa-scale-balanced"></i> Conhecimento (Regras)</h3>
                    <div class="data-row"><strong>5 Regras de RP:</strong> <div class="data-answer">${data.conhecimento?.regras || ''}</div></div>
                    <div class="data-row"><strong>VDM:</strong> <div class="data-answer">${data.conhecimento?.vdm || ''}</div></div>
                    <div class="data-row"><strong>RDM:</strong> <div class="data-answer">${data.conhecimento?.rdm || ''}</div></div>
                    <div class="data-row"><strong>MG:</strong> <div class="data-answer">${data.conhecimento?.mg || ''}</div></div>
                    <div class="data-row"><strong>PG:</strong> <div class="data-answer">${data.conhecimento?.pg || ''}</div></div>
                </div>

                <div class="data-group">
                    <h3><i class="fa-solid fa-bullseye"></i> Compromisso & Final</h3>
                    <div class="data-row"><strong>Motivo:</strong> <div class="data-answer">${data.compromisso?.motivo || ''}</div></div>
                    <div class="data-row"><strong>Horário:</strong> ${data.compromisso?.horario || ''}</div>
                    <div class="data-row"><strong>Turno Diário:</strong> ${data.compromisso?.turnoDiario || ''}</div>
                    <div class="data-row" style="margin-top: 15px;"><strong>Aceita Regras:</strong> ${data.aceitaRegras?.toUpperCase() || ''}</div>
                    <div class="data-row"><strong>Preparo e Justificativa (0-10):</strong> <div class="data-answer">${data.preparoEJustificativa || ''}</div></div>
                </div>
            `;

            document.getElementById('readModalOverlay').classList.add('active');
        }

        window.closeReadModal = function() {
            document.getElementById('readModalOverlay').classList.remove('active');
        }

        // ==========================================
        // LÓGICA DE EXCLUSÃO
        // ==========================================
        window.triggerDelete = function(id) {
            deleteIdTarget = id;
            document.getElementById('deleteModalOverlay').classList.add('active');
        }

        window.closeDeleteModal = function() {
            deleteIdTarget = null;
            document.getElementById('deleteModalOverlay').classList.remove('active');
        }

        document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
            if(!deleteIdTarget) return;

            const btn = document.getElementById('btnConfirmDelete');
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                await deleteDoc(doc(db, "formularios_staff", deleteIdTarget));
                showToast("Candidatura excluída com sucesso.");
                closeDeleteModal();
            } catch (error) {
                console.error("Erro ao excluir:", error);
                showToast("Erro ao excluir candidatura.", "error");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });

        // Fechar modals clicando fora
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if(e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });

    </script>
</body>
</html>
