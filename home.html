<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Premium | Admin Lider Jester</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === PALETA JESTER PREMIUM === */
        :root {
            --bg-main: #030303;
            --bg-card: rgba(15, 15, 15, 0.85);
            --bg-input: #141414;
            --red-accent: #9e0000;
            --red-light: #ff1a1a;
            --red-glow: rgba(255, 26, 26, 0.3);
            --gold-accent: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --white: #f5f5f5;
            --text-dim: #a0a0a0;
            --border-color: #2a2a2a;
            
            /* Status Colors */
            --status-pending: #d4af37;
            --status-approved: #2ecc71;
            --status-rejected: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--red-accent); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--red-light); }

        body {
            background-color: var(--bg-main);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* === HEADER GLASSMORPHISM === */
        header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 26, 26, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .header-title {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--white), var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-title i {
            -webkit-text-fill-color: var(--gold-accent);
            filter: drop-shadow(0 0 8px var(--gold-glow));
            font-size: 1.6rem;
        }

        .btn-logout {
            background: rgba(255, 26, 26, 0.1);
            border: 1px solid var(--red-accent);
            color: var(--white);
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-logout:hover {
            background: var(--red-accent);
            box-shadow: 0 0 15px var(--red-glow);
            transform: translateY(-2px);
        }

        /* === BANNER === */
        .banner {
            width: 100%;
            height: 350px;
            background-image: url('https://jealous-peach-l5eo3dc6ll.edgeone.app/IMG_20260418_140856.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            margin-top: 60px;
        }

        .banner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-main) 10%, rgba(3,3,3,0.7) 50%, transparent);
        }

        /* === CONTAINER & STATS === */
        .container {
            max-width: 1400px;
            margin: -80px auto 50px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { font-size: 2.5rem; }
        .stat-info h4 { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-info span { font-size: 1.8rem; font-weight: 800; color: var(--white); }

        /* Custom Stat Colors */
        .stat-total .stat-icon { color: var(--gold-accent); filter: drop-shadow(0 0 10px var(--gold-glow)); }
        .stat-pending .stat-icon { color: var(--status-pending); filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        .stat-approved .stat-icon { color: var(--status-approved); filter: drop-shadow(0 0 10px rgba(46,204,113,0.3)); }
        .stat-rejected .stat-icon { color: var(--status-rejected); filter: drop-shadow(0 0 10px rgba(231,76,60,0.3)); }

        /* === CONTROLS === */
        .dashboard-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-wrap: wrap;
            gap: 15px;
        }

        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            flex: 1;
        }

        .search-box { position: relative; flex: 2; min-width: 250px; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        .search-box input, .filter-select {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-color);
            padding: 12px 15px 12px 40px; border-radius: 8px; color: var(--white);
            font-size: 0.95rem; transition: all 0.3s;
        }
        
        .filter-select { padding: 12px 15px; flex: 1; min-width: 150px; cursor: pointer; }
        .search-box input:focus, .filter-select:focus { outline: none; border-color: var(--gold-accent); box-shadow: 0 0 10px var(--gold-glow); }

        .btn-export {
            background: linear-gradient(45deg, #1d6b41, #2ecc71);
            color: #fff; border: none; padding: 12px 20px; border-radius: 8px;
            font-weight: bold; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(46,204,113,0.3);
        }
        .btn-export:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* === CARDS GRID === */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: space-between;
            animation: fadeIn 0.6s ease backwards;
        }

        /* Dynamic Status Border */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--border-color); transition: background 0.3s ease;
        }
        .card[data-status="pendente"]::before { background: var(--status-pending); }
        .card[data-status="aprovado"]::before { background: var(--status-approved); }
        .card[data-status="reprovado"]::before { background: var(--status-rejected); }

        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .card[data-status="pendente"]:hover { border-color: rgba(212, 175, 55, 0.3); }
        .card[data-status="aprovado"]:hover { border-color: rgba(46, 204, 113, 0.3); }
        .card[data-status="reprovado"]:hover { border-color: rgba(231, 76, 60, 0.3); }

        .card-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;
        }

        .card-name-group { display: flex; flex-direction: column; gap: 5px; }
        .card-name { font-size: 1.25rem; font-weight: 800; color: var(--white); display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
        .card-name i { color: var(--red-light); font-size: 1.1rem; }
        
        .status-badge {
            font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase;
            display: inline-block; width: max-content;
        }
        .status-badge.pendente { background: rgba(212,175,55,0.1); color: var(--status-pending); border: 1px solid rgba(212,175,55,0.3); }
        .status-badge.aprovado { background: rgba(46,204,113,0.1); color: var(--status-approved); border: 1px solid rgba(46,204,113,0.3); }
        .status-badge.reprovado { background: rgba(231,76,60,0.1); color: var(--status-rejected); border: 1px solid rgba(231,76,60,0.3); }

        .card-date { font-size: 0.75rem; color: var(--text-dim); text-align: right; }
        .card-body p { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 10px; }
        .card-body strong { color: #ccc; }

        .discord-tag {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(88, 101, 242, 0.1); color: #7289da;
            padding: 6px 12px; border-radius: 6px; font-size: 0.9rem;
            margin-top: 10px; border: 1px solid rgba(88, 101, 242, 0.3);
            cursor: pointer; transition: all 0.3s;
        }
        .discord-tag:hover { background: #5865F2; color: #fff; box-shadow: 0 0 15px rgba(88, 101, 242, 0.4); }

        .card-actions { display: flex; gap: 12px; margin-top: 25px; }
        .btn-action {
            flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: all 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
        }
        .btn-read { background: rgba(255,255,255,0.05); color: var(--white); border: 1px solid var(--border-color); }
        .btn-read:hover { background: var(--gold-accent); color: #000; border-color: var(--gold-accent); box-shadow: 0 0 15px var(--gold-glow); }
        .btn-delete { flex: 0.3; background: transparent; color: var(--text-dim); border: 1px solid var(--border-color); }
        .btn-delete:hover { background: rgba(255, 26, 26, 0.15); color: var(--red-light); border-color: var(--red-light); }

        /* === MODALS PREMIUM === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-read {
            background: var(--bg-card); width: 95%; max-width: 1000px; max-height: 90vh;
            border-radius: 12px; border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); display: flex; flex-direction: column;
            transform: scale(0.95) translateY(20px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .modal-read::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--gold-accent), var(--red-accent));
        }
        .modal-overlay.active .modal-read { transform: scale(1) translateY(0); }

        .modal-header {
            padding: 25px 30px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3);
        }
        .modal-header h2 { color: var(--white); font-size: 1.6rem; display: flex; align-items: center; gap: 10px; }
        .modal-header h2 i { color: var(--gold-accent); }
        .close-modal {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--white);
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s;
        }
        .close-modal:hover { background: var(--red-accent); border-color: var(--red-accent); transform: rotate(90deg); }

        .modal-content-wrapper {
            display: flex; overflow: hidden; flex: 1;
        }
        
        .modal-body { 
            padding: 30px; overflow-y: auto; flex: 2; display: flex; flex-direction: column; gap: 20px; 
            border-right: 1px solid var(--border-color);
        }

        .modal-sidebar {
            flex: 1; background: rgba(0,0,0,0.4); padding: 30px; display: flex; flex-direction: column; gap: 20px;
            overflow-y: auto;
        }

        .data-group {
            background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px;
            border-left: 4px solid var(--red-accent); border: 1px solid var(--border-color); border-left-width: 4px;
        }
        .data-group h3 { font-size: 1.1rem; color: var(--gold-accent); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .data-row { margin-bottom: 12px; color: var(--text-dim); font-size: 1rem; }
        .data-row strong { color: var(--white); }
        .data-answer { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 6px; margin-top: 8px; white-space: pre-wrap; border: 1px solid rgba(255,255,255,0.05); color: #ddd; font-style: italic; }

        /* Sidebar Admin Controls */
        .admin-controls h3 { color: var(--white); font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-dim); margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; text-transform: uppercase;}
        .status-select { width: 100%; padding: 12px; border-radius: 8px; background: var(--bg-input); color: var(--white); border: 1px solid var(--border-color); outline: none; }
        .status-select:focus { border-color: var(--gold-accent); }
        .admin-note { width: 100%; min-height: 150px; padding: 15px; border-radius: 8px; background: var(--bg-input); color: var(--white); border: 1px solid var(--border-color); resize: vertical; outline: none; }
        .admin-note:focus { border-color: var(--gold-accent); }
        .btn-save-admin { width: 100%; background: linear-gradient(45deg, var(--gold-accent), #b8860b); color: #000; font-weight: bold; border: none; padding: 15px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 1rem; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-save-admin:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--gold-glow); }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); margin-top: 10px; }
        .video-container iframe, .video-container video { width: 100%; height: 100%; border: none; }
        .btn-drive-link { display: inline-flex; align-items: center; gap: 10px; background: #1e1e1e; color: #fff; padding: 12px 20px; border-radius: 8px; text-decoration: none; border: 1px solid #333; transition: all 0.3s; margin-top: 10px; font-weight: 600; }
        .btn-drive-link:hover { background: var(--gold-accent); color: #000; box-shadow: 0 0 15px var(--gold-glow); }

        /* Modal Confirmação */
        .modal-confirm { background: var(--bg-card); width: 100%; max-width: 450px; padding: 40px 30px; border-radius: 12px; border: 1px solid var(--red-accent); text-align: center; transform: translateY(-50px) scale(0.9); transition: all 0.3s ease; box-shadow: 0 20px 50px rgba(158,0,0,0.3); }
        .modal-overlay.active .modal-confirm { transform: translateY(0) scale(1); }
        .modal-confirm i { font-size: 4rem; color: var(--red-light); margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--red-glow)); }
        .modal-confirm h3 { color: var(--white); margin-bottom: 10px; font-size: 1.5rem; }
        .modal-confirm p { color: var(--text-dim); margin-bottom: 30px; font-size: 1rem; }
        .confirm-actions { display: flex; gap: 15px; justify-content: center; }
        .btn-cancel { padding: 12px 25px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--white); border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-confirm-delete { padding: 12px 25px; background: var(--red-accent); border: none; color: var(--white); border-radius: 6px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px var(--red-glow); }
        .btn-confirm-delete:hover { background: var(--red-light); }

        /* === TOAST === */
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); border: 1px solid var(--border-color); border-left: 4px solid var(--red-accent); color: var(--white); padding: 18px 25px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: var(--gold-accent); }

        .loading-container { text-align: center; padding: 50px; color: var(--text-dim); }
        .loading-container i { font-size: 3rem; color: var(--red-accent); margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--red-glow)); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 992px) {
            .modal-content-wrapper { flex-direction: column; overflow-y: auto; }
            .modal-body { overflow-y: visible; border-right: none; border-bottom: 1px solid var(--border-color); }
            .modal-sidebar { overflow-y: visible; }
        }

        @media (max-width: 768px) {
            .dashboard-controls { flex-direction: column; align-items: stretch; }
            .control-group { flex-direction: column; }
            header { padding: 15px 20px; }
            .header-title span { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <i class="fa-solid fa-mask"></i>
            <span>Painel Jester Premium</span>
        </div>
        <button class="btn-logout" id="btnLogout">
            <i class="fa-solid fa-power-off"></i> Desconectar
        </button>
    </header>

    <div class="banner"></div>

    <div class="container">
        
        <div class="stats-grid">
            <div class="stat-card stat-total">
                <i class="fa-solid fa-layer-group stat-icon"></i>
                <div class="stat-info">
                    <h4>Total Fichas</h4>
                    <span id="countTotal">0</span>
                </div>
            </div>
            <div class="stat-card stat-pending">
                <i class="fa-solid fa-clock-rotate-left stat-icon"></i>
                <div class="stat-info">
                    <h4>Pendentes</h4>
                    <span id="countPending">0</span>
                </div>
            </div>
            <div class="stat-card stat-approved">
                <i class="fa-solid fa-check-double stat-icon"></i>
                <div class="stat-info">
                    <h4>Aprovados</h4>
                    <span id="countApproved">0</span>
                </div>
            </div>
            <div class="stat-card stat-rejected">
                <i class="fa-solid fa-xmark stat-icon"></i>
                <div class="stat-info">
                    <h4>Reprovados</h4>
                    <span id="countRejected">0</span>
                </div>
            </div>
        </div>

        <div class="dashboard-controls">
            <div class="control-group">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar por nome ou Discord...">
                </div>
                <select id="filterStatus" class="filter-select">
                    <option value="all">Todos os Status</option>
                    <option value="pendente">Apenas Pendentes</option>
                    <option value="aprovado">Apenas Aprovados</option>
                    <option value="reprovado">Apenas Reprovados</option>
                </select>
                <select id="sortOrder" class="filter-select">
                    <option value="newest">Mais Recentes</option>
                    <option value="oldest">Mais Antigos</option>
                    <option value="az">Nome (A-Z)</option>
                </select>
            </div>
            <button class="btn-export" onclick="exportCSV()">
                <i class="fa-solid fa-file-csv"></i> Exportar Dados
            </button>
        </div>

        <div id="loading" class="loading-container">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <h2>Carregando Banco de Dados...</h2>
        </div>

        <div class="cards-grid" id="cardsContainer"></div>
    </div>

    <div class="modal-overlay" id="readModalOverlay">
        <div class="modal-read">
            <div class="modal-header">
                <h2><i class="fa-solid fa-clipboard-user"></i> Avaliação de Candidato</h2>
                <button class="close-modal" onclick="closeReadModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-content-wrapper">
                <div class="modal-body" id="modalBodyContent">
                    </div>
                <div class="modal-sidebar">
                    <div class="admin-controls">
                        <h3><i class="fa-solid fa-user-shield"></i> Painel Administrativo</h3>
                        <input type="hidden" id="editFormId">
                        
                        <div class="form-group">
                            <label for="editStatus">Status da Avaliação</label>
                            <select id="editStatus" class="status-select">
                                <option value="pendente">🟡 Pendente / Em Análise</option>
                                <option value="aprovado">🟢 Aprovado</option>
                                <option value="reprovado">🔴 Reprovado</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="editAdminNote">Notas Internas da Staff</label>
                            <textarea id="editAdminNote" class="admin-note" placeholder="Escreva observações sobre o candidato aqui. Isso não será visto por ele..."></textarea>
                        </div>

                        <button class="btn-save-admin" id="btnSaveAdmin" onclick="saveAdminData()">
                            <i class="fa-solid fa-floppy-disk"></i> Salvar Veredito
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteModalOverlay">
        <div class="modal-confirm">
            <i class="fa-solid fa-fire-flame-curved"></i>
            <h3>Incinerar Ficha?</h3>
            <p>Essa ação não pode ser desfeita. O formulário será apagado permanentemente do banco de dados.</p>
            <div class="confirm-actions">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
                <button class="btn-confirm-delete" id="btnConfirmDelete"><i class="fa-solid fa-trash"></i> Sim, Excluir</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwVQFewEN1mQDe0pnIEVU_H98l5JCeciI",
            authDomain: "site-f55e1.firebaseapp.com",
            projectId: "site-f55e1",
            storageBucket: "site-f55e1.firebasestorage.app",
            messagingSenderId: "800441189890",
            appId: "1:800441189890:web:27f8911aa47964665f091b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const cardsContainer = document.getElementById('cardsContainer');
        const loadingText = document.getElementById('loading');
        
        // Elementos de Controle
        const searchInput = document.getElementById('searchInput');
        const filterStatus = document.getElementById('filterStatus');
        const sortOrder = document.getElementById('sortOrder');
        
        let allApplications = []; 
        let deleteIdTarget = null; 

        // Sistema de Toast Moderno
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check" style="color: var(--gold-accent);"></i>' : '<i class="fa-solid fa-triangle-exclamation" style="color: var(--red-light);"></i>';
            toast.innerHTML = `<span style="font-size: 1.4rem;">${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3500);
        }

        window.copyDiscord = function(discordTag) {
            navigator.clipboard.writeText(discordTag).then(() => {
                showToast(`Discord ${discordTag} copiado!`, 'success');
            });
        }

        // Verificação de Auth
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html';
        });
        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });

        // Renderização de Mídia
        function renderMedia(url) {
            if(!url) return '<p style="color: var(--red-light);">Nenhum vídeo enviado.</p>';
            const youtubeMatch = url.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
            if(youtubeMatch) return `<div class="video-container"><iframe src="https://www.youtube.com/embed/${youtubeMatch}" allowfullscreen></iframe></div>`;
            if(url.match(/\.(mp4|webm|ogg)$/i)) return `<div class="video-container"><video src="${url}" controls></video></div>`;
            const isDrive = url.includes('drive.google.com');
            return `<a href="${url}" target="_blank" class="btn-drive-link"><i class="${isDrive ? 'fa-brands fa-google-drive' : 'fa-solid fa-link'}"></i> ${isDrive ? 'Assistir no Google Drive' : 'Abrir Link Externo'}</a>`;
        }

        // Atualização dos Cards
        function renderCards(dataArray) {
            cardsContainer.innerHTML = '';
            
            if (dataArray.length === 0) {
                cardsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-dim);"><i class="fa-solid fa-folder-open" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.3;"></i><p style="font-size: 1.2rem;">Nenhuma ficha encontrada com esses filtros.</p></div>';
                return;
            }

            let delay = 0;
            dataArray.forEach((data) => {
                let dataFormatada = "Data desconhecida";
                let timestamp = 0;
                if(data.dataEnvio) {
                    const dateObj = data.dataEnvio.toDate ? data.dataEnvio.toDate() : new Date(data.dataEnvio);
                    timestamp = dateObj.getTime();
                    dataFormatada = dateObj.toLocaleDateString('pt-BR') + ' às ' + dateObj.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                }

                // Status Default Handling
                const status = data.status || 'pendente';
                let statusName = 'Pendente';
                if(status === 'aprovado') statusName = 'Aprovado';
                if(status === 'reprovado') statusName = 'Reprovado';

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-status', status);
                card.style.animationDelay = `${delay}s`;
                delay += 0.05;

                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <div class="card-name-group">
                                <div class="card-name"><i class="fa-solid fa-user-ninja"></i> ${data.nome}</div>
                                <span class="status-badge ${status}">${statusName}</span>
                            </div>
                            <span class="card-date">${dataFormatada}</span>
                        </div>
                        <div class="card-body">
                            <p><strong><i class="fa-solid fa-cake-candles"></i> Idade:</strong> ${data.idade} anos</p>
                            <p><strong><i class="fa-solid fa-map-location-dot"></i> Estado:</strong> ${data.estado}</p>
                            <p><strong><i class="fa-solid fa-star"></i> Já foi Staff?</strong> ${data.experiencia === 'sim' ? '<span style="color:var(--gold-accent); font-weight:bold;">Sim</span>' : 'Não'}</p>
                            <div class="discord-tag" onclick="copyDiscord('${data.discord}')" title="Clique para copiar">
                                <i class="fa-brands fa-discord"></i> ${data.discord} <i class="fa-regular fa-copy" style="font-size: 0.8em; margin-left: 5px;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-action btn-read" onclick="openReadModal('${data.id}')"><i class="fa-solid fa-book-open"></i> Acessar Ficha</button>
                        <button class="btn-action btn-delete" onclick="triggerDelete('${data.id}')" title="Apagar Definitivamente"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                cardsContainer.appendChild(card);
            });
        }

        // Atualizar Estatísticas do Topo
        function updateStats(dataArray) {
            document.getElementById('countTotal').innerText = dataArray.length;
            document.getElementById('countPending').innerText = dataArray.filter(d => (d.status || 'pendente') === 'pendente').length;
            document.getElementById('countApproved').innerText = dataArray.filter(d => d.status === 'aprovado').length;
            document.getElementById('countRejected').innerText = dataArray.filter(d => d.status === 'reprovado').length;
        }

        // Lógica de Filtros e Ordenação
        function applyFilters() {
            const term = searchInput.value.toLowerCase();
            const statusFilter = filterStatus.value;
            const order = sortOrder.value;

            let filtered = allApplications.filter(app => {
                const matchSearch = app.nome.toLowerCase().includes(term) || app.discord.toLowerCase().includes(term);
                const appStatus = app.status || 'pendente';
                const matchStatus = statusFilter === 'all' ? true : appStatus === statusFilter;
                return matchSearch && matchStatus;
            });

            filtered.sort((a, b) => {
                const timeA = a.dataEnvio ? (a.dataEnvio.toDate ? a.dataEnvio.toDate().getTime() : new Date(a.dataEnvio).getTime()) : 0;
                const timeB = b.dataEnvio ? (b.dataEnvio.toDate ? b.dataEnvio.toDate().getTime() : new Date(b.dataEnvio).getTime()) : 0;
                
                if(order === 'newest') return timeB - timeA;
                if(order === 'oldest') return timeA - timeB;
                if(order === 'az') return a.nome.localeCompare(b.nome);
                return 0;
            });

            renderCards(filtered);
        }

        // Listeners de Filtro
        searchInput.addEventListener('input', applyFilters);
        filterStatus.addEventListener('change', applyFilters);
        sortOrder.addEventListener('change', applyFilters);

        // Conexão com Firebase Firestore
        const q = query(collection(db, "formularios_staff"), orderBy("dataEnvio", "desc"));
        onSnapshot(q, (snapshot) => {
            loadingText.style.display = 'none';
            allApplications = [];
            snapshot.forEach((doc) => {
                const data = doc.data();
                data.id = doc.id;
                allApplications.push(data);
            });
            updateStats(allApplications);
            applyFilters(); // Renderiza usando os filtros atuais
        }, (error) => {
            console.error(error);
            showToast("Erro de permissão ou conexão com banco de dados.", "error");
        });

        // Modais de Leitura e Edição
        window.openReadModal = function(id) {
            const appData = allApplications.find(app => app.id === id);
            if(!appData) return;

            const modalBody = document.getElementById('modalBodyContent');
            const conn = appData.conhecimento || {};
            const comp = appData.compromisso || {};
            
            // Popula os campos do Admin Sidebar
            document.getElementById('editFormId').value = appData.id;
            document.getElementById('editStatus').value = appData.status || 'pendente';
            document.getElementById('editAdminNote').value = appData.adminNota || '';
            
            modalBody.innerHTML = `
                <div class="data-group">
                    <h3><i class="fa-solid fa-video"></i> Verificação de Vídeo</h3>
                    ${renderMedia(appData.videoIdentidade)}
                </div>
                <div class="data-group">
                    <h3><i class="fa-solid fa-address-card"></i> 1. Identidade</h3>
                    <div class="data-row"><strong>Nome Completo:</strong> ${appData.nome}</div>
                    <div class="data-row"><strong>Idade:</strong> ${appData.idade} anos</div>
                    <div class="data-row"><strong>Estado:</strong> ${appData.estado}</div>
                    <div class="data-row"><strong>Discord:</strong> <span style="color: #7289da;">${appData.discord}</span></div>
                </div>
                <div class="data-group">
                    <h3><i class="fa-solid fa-clock-rotate-left"></i> 2. Histórico</h3>
                    <div class="data-row"><strong>Já foi Staff?</strong> ${appData.experiencia === 'sim' ? 'Sim' : 'Não'}</div>
                    ${appData.experiencia === 'sim' ? `<div class="data-row"><strong>Detalhes da Experiência:</strong><div class="data-answer">${appData.experienciaDetalhes || 'Não detalhou.'}</div></div>` : ''}
                </div>
                <div class="data-group">
                    <h3><i class="fa-solid fa-brain"></i> 3. Teste Teórico</h3>
                    <div class="data-row"><strong>5 Regras Fundamentais:</strong><div class="data-answer">${conn.regras || 'Não respondeu'}</div></div>
                    <div class="data-row"><strong>Regra ATI:</strong><div class="data-answer">${conn.ati || 'Não respondeu'}</div></div>
                    <div class="data-row"><strong>Regra ESM:</strong><div class="data-answer">${conn.esm || 'Não respondeu'}</div></div>
                    <div class="data-row"><strong>Regra IER:</strong><div class="data-answer">${conn.ier || 'Não respondeu'}</div></div>
                    <div class="data-row"><strong>Regra DV:</strong><div class="data-answer">${conn.dv || 'Não respondeu'}</div></div>
                </div>
                <div class="data-group">
                    <h3><i class="fa-solid fa-calendar-check"></i> 4. Intenções e Tempo</h3>
                    <div class="data-row"><strong>Motivação:</strong><div class="data-answer">${comp.motivo || 'Não respondeu'}</div></div>
                    <div class="data-row"><strong>Horário Disponível:</strong><div class="data-answer">${comp.horario || 'Não respondeu'}</div></div>
                    <div class="data-row"><strong>Garante o Turno?</strong><div class="data-answer">${comp.turnoDiario || 'Não respondeu'}</div></div>
                </div>
                <div class="data-group">
                    <h3><i class="fa-solid fa-gavel"></i> 5. Acordo de Responsabilidade</h3>
                    <div class="data-row"><strong>Aceita punir conforme tabela?</strong> ${appData.aceitaRegras === 'sim' ? '<span style="color:#4CAF50">Sim</span>' : '<span style="color:#F44336">Não</span>'}</div>
                    <div class="data-row"><strong>Nota de Preparo e Justificativa:</strong><div class="data-answer">${appData.preparoEJustificativa || 'Não respondeu'}</div></div>
                </div>
            `;
            
            document.getElementById('readModalOverlay').classList.add('active');
        }

        window.closeReadModal = function() {
            document.getElementById('readModalOverlay').classList.remove('active');
        }

        // Salvar Informações Administrativas (Status e Notas)
        window.saveAdminData = async function() {
            const btn = document.getElementById('btnSaveAdmin');
            const id = document.getElementById('editFormId').value;
            const newStatus = document.getElementById('editStatus').value;
            const newNote = document.getElementById('editAdminNote').value;

            if(!id) return;

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;

            try {
                const docRef = doc(db, "formularios_staff", id);
                await updateDoc(docRef, {
                    status: newStatus,
                    adminNota: newNote
                });
                showToast("Decisão da Staff salva com sucesso!", "success");
                closeReadModal();
            } catch (error) {
                console.error(error);
                showToast("Erro ao salvar alterações.", "error");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar Veredito';
                btn.disabled = false;
            }
        }

        // Sistema de Exclusão
        window.triggerDelete = function(id) {
            deleteIdTarget = id;
            document.getElementById('deleteModalOverlay').classList.add('active');
        }

        window.closeDeleteModal = function() {
            deleteIdTarget = null;
            document.getElementById('deleteModalOverlay').classList.remove('active');
        }

        document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
            if(!deleteIdTarget) return;
            const btn = document.getElementById('btnConfirmDelete');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Incinerando...';
            btn.disabled = true;

            try {
                await deleteDoc(doc(db, "formularios_staff", deleteIdTarget));
                showToast("Ficha deletada permanentemente.", "success");
                closeDeleteModal();
            } catch (error) {
                console.error(error);
                showToast("Erro ao excluir.", "error");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-trash"></i> Sim, Excluir';
                btn.disabled = false;
            }
        });

        // Fechar Modais clicando fora
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if(e.target === overlay) overlay.classList.remove('active');
            });
        });

        // Exportar para CSV
        window.exportCSV = function() {
            if(allApplications.length === 0) {
                showToast("Nenhum dado para exportar.", "error");
                return;
            }

            // Headers do CSV
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Nome,Idade,Estado,Discord,Status,Experiencia,Nota Admin,Data Envio\n";

            // Usar o filtro atual visível na tela ou allApplications? Vamos exportar o que está visível.
            const term = searchInput.value.toLowerCase();
            const statusFilter = filterStatus.value;
            const dataToExport = allApplications.filter(app => {
                const matchSearch = app.nome.toLowerCase().includes(term) || app.discord.toLowerCase().includes(term);
                const appStatus = app.status || 'pendente';
                const matchStatus = statusFilter === 'all' ? true : appStatus === statusFilter;
                return matchSearch && matchStatus;
            });

            dataToExport.forEach(app => {
                let dataFormatada = "";
                if(app.dataEnvio) {
                    const dateObj = app.dataEnvio.toDate ? app.dataEnvio.toDate() : new Date(app.dataEnvio);
                    dataFormatada = dateObj.toLocaleDateString('pt-BR') + ' ' + dateObj.toLocaleTimeString('pt-BR');
                }
                
                const escapeCsv = (str) => `"${(str || '').replace(/"/g, '""')}"`;

                const row = [
                    escapeCsv(app.nome),
                    app.idade,
                    escapeCsv(app.estado),
                    escapeCsv(app.discord),
                    escapeCsv(app.status || 'pendente'),
                    escapeCsv(app.experiencia),
                    escapeCsv(app.adminNota),
                    escapeCsv(dataFormatada)
                ].join(",");
                
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `fichas_jester_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Download do CSV iniciado!", "success");
        }

    </script>
</body>
</html>
